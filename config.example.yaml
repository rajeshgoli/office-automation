# Office Climate Automation Configuration
# Copy this to config.yaml and fill in your values

# YoLink Cloud API (get from YoLink App > Account > Advanced Settings > Personal Access Credentials)
yolink:
  uaid: "your_uaid"
  secret_key: "your_secret_key"

# Qingping Air Monitor (get from developer.qingping.co after setting up Private Access Config)
qingping:
  mqtt_broker: "localhost"  # or IP of your MQTT broker
  mqtt_port: 1883
  mqtt_username: "qingping"
  mqtt_password: "replace-with-random-device-password"
  device_mac: "AA:BB:CC:DD:EE:FF"

# Android artifact upload hardening. Set this to the SHA-256 digest of the
# office-climate release signing certificate. The deploy endpoint rejects APKs
# signed by any other cert when this is configured.
artifacts:
  office_climate_signing_cert_sha256: "replace-with-release-signing-cert-sha256"
  # Optional if apksigner is not on PATH.
  # apksigner_path: "/absolute/path/to/apksigner"

# Cloudflare Access device policy sync. The Android Service Auth policy should
# use Common Name selectors, not a broad Valid Certificate selector. The same
# Rust binary updates that allowlist during oa register-device/revoke-device.
cloudflare_access:
  account_id: "cloudflare-account-id"
  app_id: "optional-access-application-id"
  jwt_audience: "cloudflare-access-application-aud-tag"
  device_policy_id: "cloudflare-device-mtls-policy-id"
  api_token: "cloudflare-api-token-with-access-apps-policies-write"

# Airlink ERV (Tuya-based)
# Option 1: LocalTuya
erv:
  type: "tuya"  # or "shelly" for relay control
  device_id: "your_tuya_device_id"
  local_key: "your_tuya_local_key"
  ip: "192.168.1.xxx"

# Option 2: Shelly relay (if using relay instead of Tuya)
# erv:
#   type: "shelly"
#   ip: "192.168.1.xxx"

# Mitsubishi (pykumo)
mitsubishi:
  username: "your_kumo_email"
  password: "your_kumo_password"
  # If using ESPHome instead:
  # type: "esphome"
  # ip: "192.168.1.xxx"

# Automation thresholds (from vision.md)
thresholds:
  co2_critical_ppm: 2000      # ERV on even when present
  co2_refresh_target_ppm: 500  # Target for away-mode ventilation
  co2_plateau_release_delta_ppm: 100 # Resume ventilation if CO2 climbs this far above learned outdoor baseline
  erv_min_dwell_seconds: 180   # Minimum time between automated ERV speed changes within stable presence state
  hvac_heat_off_temp_f: 75     # Turn heat off at/above this Qingping temp
  hvac_heat_on_temp_f: 71      # Turn heat back on at/below this temp (hysteresis)
  hvac_cool_on_temp_f: 81      # Start cooling above this Qingping temp
  hvac_cool_off_temp_f: 78     # Stop cooling at/below this temp (hysteresis)
  hvac_cool_setpoint_f: 78     # Cooling target when automation starts cooling
  motion_timeout_seconds: 60   # Time before motion absence triggers away
  mac_poll_interval_seconds: 5 # How often to check Mac occupancy
  away_stale_flush_enabled: true        # Periodic stale-air flush while away
  away_stale_flush_interval_hours: 8    # Flush every 8 hours if room stays closed
  away_stale_flush_duration_minutes: 30 # Run each stale flush for 30 minutes
  away_stale_flush_speed: "medium"      # 3/2 airflow (quiet|medium|turbo)

# Orchestrator network settings (for Mac occupancy detector to report to)
orchestrator:
  host: "127.0.0.1"
  port: 8080
  # Admins can upload Android artifacts through /deploy. OAuth uses email addresses;
  # Basic auth uses the configured auth_username. Leave empty to disable uploads.
  admin_emails:
    - "your_email@example.com"
  # Optional: Enable HTTP Basic Auth for remote access (recommended with Cloudflare Tunnel)
  # auth_username: "admin"
  # auth_password: "your_secure_password"

telemetry:
  days: 14
  repos:
    - ~/projects/office-automate
    - ~/projects/session-manager
    - ~/projects/deskbar
    - ~/projects/fractal-quant-algo
    - ~/projects/fractal-algo-rust
    - ~/projects/social_media
    - ~/projects/backup-manager
  codex_events_db: ~/.local/share/claude-sessions/codex_events.db
  session_manager_sessions: ~/.local/share/claude-sessions/sessions.json
  session_tool_usage_db: ~/.local/share/claude-sessions/tool_usage.db
  tool_usage_db: ~/.local/share/claude-sessions/tool_usage.db
  telemetry_db: data/telemetry.db
  engram_db: data/engram_state.db
  engram_registry: data/engram_concept_registry.md
