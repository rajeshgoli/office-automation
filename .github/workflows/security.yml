name: Security Gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-supply-chain:
    name: Rust supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Fetch locked Rust dependencies
        run: cargo fetch --locked
      - name: Install cargo audit tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: Run cargo audit
        run: cargo audit --deny warnings
      - name: Run cargo deny
        run: cargo deny --locked check advisories bans sources
      - name: Build release binary from locked checkout
        run: cargo build --locked --manifest-path rust/office-automate-server/Cargo.toml --release
      - name: Emit release provenance
        run: scripts/security/release-provenance.sh target/release/office-automate-server

  frontend-supply-chain:
    name: Frontend supply chain
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked npm dependencies
        run: npm ci
      - name: Audit npm lockfile
        run: npm audit --audit-level=high
      - name: Build frontend
        run: npm run build

  android-supply-chain:
    name: Android supply chain
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify debug runtime dependencies
        run: ./gradlew --dependency-verification=strict :app:dependencies --configuration debugRuntimeClasspath
      - name: Verify release runtime dependencies
        run: ./gradlew --dependency-verification=strict :app:dependencies --configuration releaseRuntimeClasspath
      - name: Build debug APK with verified dependencies
        run: ./gradlew --dependency-verification=strict :app:assembleDebug
